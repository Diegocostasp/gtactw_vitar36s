name: Build PortMaster ARMHF

on:
  workflow_dispatch:
  push:
    branches:
      - portmaster-linux
      - main
      - master

jobs:
  build-armhf:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure APT for ARMHF
        run: |
          sudo dpkg --add-architecture armhf

          sudo mkdir -p /etc/apt/backup-sources
          sudo mv /etc/apt/sources.list.d/*.sources /etc/apt/backup-sources/ 2>/dev/null || true
          sudo mv /etc/apt/sources.list.d/*.list /etc/apt/backup-sources/ 2>/dev/null || true
          sudo mv /etc/apt/sources.list /etc/apt/backup-sources/sources.list 2>/dev/null || true

          sudo tee /etc/apt/sources.list > /dev/null <<'EOF'
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-backports main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
          EOF

          sudo tee /etc/apt/sources.list.d/ubuntu-armhf.list > /dev/null <<'EOF'
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-backports main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          EOF

          sudo apt-get clean
          sudo apt-get update

      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            pkg-config \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            libc6-dev:armhf \
            libstdc++-11-dev:armhf \
            libsdl2-dev:armhf \
            libopenal-dev:armhf \
            libmpg123-dev:armhf \
            libegl1-mesa-dev:armhf \
            libgles2-mesa-dev:armhf \
            zlib1g-dev:armhf \
            zip \
            file

      - name: Configure CMake
        run: |
          cmake -S . -B build-portmaster \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/armhf.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DPORTMASTER_LINUX=ON

      - name: Build
        run: |
          cmake --build build-portmaster --verbose

      - name: Check binary type
        run: |
          file build-portmaster/gtactw.armhf || true

      - name: Prepare PortMaster package
        run: |
          mkdir -p dist/gtactw/gtactw
          cp build-portmaster/gtactw.armhf dist/gtactw/gtactw/
          cp -r portmaster/gtactw/* dist/gtactw/
          chmod +x "dist/gtactw/GTA Chinatown Wars.sh"
          chmod +x "dist/gtactw/gtactw/gtactw.armhf"
          cd dist
          zip -r gtactw-portmaster-armhf.zip gtactw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gtactw-portmaster-armhf
          path: dist/gtactw-portmaster-armhf.zip
